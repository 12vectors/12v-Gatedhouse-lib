name: Release

# Each SDK releases independently, triggered by its own tag prefix —
# or manually via workflow_dispatch (pick the SDK and version; the
# GitHub Release step then creates the tag). Every job publishes to the
# SDK's public registry AND attaches the artifacts to a GitHub Release.
#
# Required one-time setup (all assume the repository is public):
#   PyPI       — register this repo as a Trusted Publisher for the
#                `gatedhouse` project on pypi.org (no secret needed).
#   crates.io  — create an API token and store it as the
#                CARGO_REGISTRY_TOKEN repository secret.
#   Maven Central — verify the com.twelvevectors namespace on
#                central.sonatype.com, then store portal-token secrets
#                CENTRAL_USERNAME / CENTRAL_PASSWORD and signing-key
#                secrets MAVEN_GPG_PRIVATE_KEY / MAVEN_GPG_PASSPHRASE.

on:
  push:
    tags:
      - "python-v*"
      - "rust-v*"
      - "java-v*"
  workflow_dispatch:
    inputs:
      sdk:
        description: "Which SDK to release"
        required: true
        type: choice
        options:
          - python
          - rust
          - java
      version:
        description: "Version to release (e.g. 0.3.0) — must match the SDK's manifest"
        required: true
        type: string

permissions:
  contents: write

jobs:
  python:
    if: >-
      startsWith(github.ref, 'refs/tags/python-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.sdk == 'python')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('python-v{0}', inputs.version) || github.ref_name }}
    permissions:
      contents: write
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk-python/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: sdk-python/dist/*

  rust:
    if: >-
      startsWith(github.ref, 'refs/tags/rust-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.sdk == 'rust')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('rust-v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Package crate
        working-directory: sdk-rust
        run: cargo package

      - name: Publish to crates.io
        working-directory: sdk-rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: sdk-rust/target/package/*.crate

  java:
    if: >-
      startsWith(github.ref, 'refs/tags/java-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.sdk == 'java')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('java-v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build, sign, and deploy to Maven Central
        working-directory: sdk-java
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn --batch-mode deploy -P central

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: sdk-java/target/*.jar
